<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#1a1016">
<title>Mega Luck · Group Draw</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ── LOBBY / HOST UI ─────────────────────────────────────────── */
:root{
  --magenta:#c3007a;--acid:#c0c456;--olive:#6f6a1c;
  --gold:#e5a783;--well:#d7a1c1;--ink:#1a1016;--card:#241019;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--ink);color:#f4e9ef;overscroll-behavior:none;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
.lobby{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;padding:28px 16px;-webkit-user-select:none;user-select:none;}
.eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:700}
h1{font-family:"Snell Roundhand","Brush Script MT","Segoe Script",cursive;
  font-weight:400;font-size:clamp(28px,7vw,52px);color:var(--acid);line-height:1;}
.sub{color:var(--well);font-size:14px;text-align:center;max-width:34ch;line-height:1.5}
.panel{background:var(--card);border:1px solid rgba(215,161,193,.16);border-radius:16px;
  padding:22px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;
  width:100%;max-width:420px;}
.host-grid{display:grid;grid-template-columns:1fr;gap:20px;width:100%;max-width:900px;}
@media(min-width:720px){.host-grid{grid-template-columns:1fr 1fr;}}
#qr{background:#fff;padding:10px;border-radius:10px;line-height:0;}
#qr img,#qr canvas{display:block;}
.count{font-size:60px;font-weight:800;color:var(--acid);line-height:.9;font-variant-numeric:tabular-nums;}
.count-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--well);}
.timer-big{font-size:clamp(60px,18vw,120px);font-weight:800;color:var(--acid);line-height:.9;
  font-variant-numeric:tabular-nums;letter-spacing:-2px;}
.lnk{font-size:10px;color:rgba(215,161,193,.45);word-break:break-all;max-width:32ch;}
.pill{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;
  background:rgba(192,196,86,.12);border:1px solid rgba(192,196,86,.3);
  font-size:12px;letter-spacing:.06em;color:var(--acid);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--acid);animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
.winner-msg{font-size:clamp(22px,5vw,38px);font-weight:800;color:var(--acid);text-align:center;line-height:1.1;}
.btn{font:700 13px/1 "Helvetica Neue",Helvetica,Arial,sans-serif;letter-spacing:.12em;
  text-transform:uppercase;padding:14px 28px;border-radius:10px;border:none;cursor:pointer;
  background:var(--magenta);color:#fff;transition:filter .15s;}
.btn:hover{filter:brightness(1.15)}.btn:active{filter:brightness(.9)}
.btn:disabled{background:#4a2438;color:#8a6a7a;cursor:default;filter:none;}
.btn.ghost{background:transparent;border:1px solid rgba(215,161,193,.3);color:var(--well);}
.hidden{display:none!important;}

/* ── TICKET SHELL (player view) ──────────────────────────────── */
.ticket-view{
  display:flex;flex-direction:column;align-items:center;
  height:100dvh;overflow:hidden;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}
.stage{flex:1 1 auto;width:100%;display:grid;place-items:center;min-height:0;}
.fit{width:390px;height:522px;transform-origin:center center;will-change:transform;}
.ticket-card{
  position:relative;width:390px;height:522px;
  filter:drop-shadow(0 10px 26px rgba(0,0,0,.55));
  cursor:none;
}
.coin{position:absolute;left:0;top:0;width:30px;height:30px;pointer-events:none;
  will-change:transform;filter:drop-shadow(0 2px 3px rgba(90,10,60,.5));}
.art{position:absolute;inset:0;width:100%;height:100%;display:block;pointer-events:none;}
.nameplate{
  position:absolute;left:12.3px;top:15.8px;width:365.3px;height:18.3px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:"Snell Roundhand","Brush Script MT","Segoe Script","Bradley Hand",cursive;
  font-size:13px;letter-spacing:.2px;white-space:nowrap;overflow:hidden;
  color:var(--olive);text-shadow:0 1px 0 rgba(255,255,255,.28);pointer-events:none;
}
.nameplate b{font-weight:400;}.nameplate .hrt{font-size:11px;opacity:.85;}
.tgrid{position:absolute;display:grid;grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(4,1fr);touch-action:none;}
.cell{position:relative;border-radius:6px;overflow:hidden;background:var(--well);}
.under{position:absolute;inset:0;padding:2px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;background:var(--well);
  box-shadow:inset 0 0 0 1px rgba(150,80,120,.14);}
.gly{font-family:"PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Microsoft YaHei",serif;
  font-size:27px;line-height:1;color:#ad0567;text-shadow:0 1px 0 rgba(255,255,255,.45);}
.cap{font:700 6px/1.16 "Helvetica Neue",Helvetica,Arial,sans-serif;letter-spacing:.07em;
  text-transform:uppercase;text-align:center;color:rgba(173,5,103,.58);
  min-height:14px;width:100%;display:flex;align-items:center;justify-content:center;}
.foil{position:absolute;inset:0;width:100%;height:100%;display:block;}
.cell.done .foil{display:none;}
.flakes{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.sweep{position:absolute;inset:0;pointer-events:none;opacity:0;
  background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.75) 50%,transparent 62%);
  mix-blend-mode:overlay;}
.ticket-card.win .sweep{animation:sweep 1.1s ease-in-out .1s 2;}
@keyframes sweep{0%{opacity:0;transform:translateX(-60%);}30%{opacity:1;}100%{opacity:0;transform:translateX(60%);}}
.hud{flex:0 0 auto;width:100%;max-width:420px;
  padding:10px 16px calc(8px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;gap:8px;align-items:center;}
.pips{display:flex;gap:7px;align-items:center;}
.pip{width:15px;height:15px;border-radius:50%;border:1.5px solid rgba(192,196,86,.4);
  background:transparent;transition:all .25s ease;}
.pip.on{background:var(--acid);border-color:var(--acid);box-shadow:0 0 10px rgba(192,196,86,.6);}
.status{font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(215,161,193,.6);font-weight:600;}
.status.result{color:var(--acid);}.status.result.lose{color:rgba(215,161,193,.85);}

/* locked overlay on ticket during countdown */
.ticket-locked{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  background:rgba(20,8,14,.82);backdrop-filter:blur(3px);border-radius:0;}
.ticket-locked .lk-timer{font-size:clamp(48px,14vw,90px);font-weight:800;color:var(--acid);
  font-variant-numeric:tabular-nums;letter-spacing:-2px;}
.ticket-locked .lk-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--well);}

/* name entry screen */
.name-screen{min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;padding:32px 24px;background:var(--ink);}
.name-cd{font-size:clamp(64px,20vw,110px);font-weight:800;color:var(--acid);line-height:.9;
  font-variant-numeric:tabular-nums;letter-spacing:-2px;}
.name-cd-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--well);margin-top:4px;}
.name-divider{width:48px;height:1px;background:rgba(215,161,193,.2);margin:8px 0;}
.name-prompt{color:#f4e9ef;font-size:15px;font-weight:600;text-align:center;}
.name-sub{color:var(--well);font-size:12px;text-align:center;max-width:26ch;line-height:1.5;margin-top:-6px;}
.name-input{background:rgba(215,161,193,.08);border:1.5px solid rgba(215,161,193,.3);
  border-radius:12px;padding:16px 20px;font-size:18px;color:#f4e9ef;outline:none;
  width:100%;max-width:300px;text-align:center;font-family:inherit;
  -webkit-user-select:text;user-select:text;}
.name-input::placeholder{color:rgba(215,161,193,.4);}
.name-input:focus{border-color:var(--acid);}
.name-btn-wrap{width:100%;max-width:300px;}

/* waiting screen (lobby) */
.waiting{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:rgba(20,8,14,.88);backdrop-filter:blur(4px);}
.waiting h2{font-family:"Snell Roundhand","Brush Script MT","Segoe Script",cursive;
  font-size:clamp(26px,7vw,44px);color:var(--acid);font-weight:400;}

/* join-via-tab button (test helper) */
.test-bar{flex:0 0 auto;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  padding:0 14px 12px;}
.test-bar button{font:600 9px/1 ui-monospace,Menlo,monospace;letter-spacing:.1em;
  padding:7px 10px;border-radius:5px;cursor:pointer;
  background:rgba(255,255,255,.05);color:rgba(215,161,193,.75);
  border:1px solid rgba(215,161,193,.18);}
.test-bar button:active{background:rgba(195,0,122,.35);}

@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
</style>
</head>

<script>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, push, child, set, update, get, onValue, runTransaction, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

/* ── guard ── */
if (String(window.FIREBASE_CONFIG.apiKey).startsWith("PASTE")) {
  document.body.innerHTML = `<div style="color:#e5a783;font-family:monospace;padding:40px;text-align:center">
    <h2>Paste your Firebase config into the CONFIG block, then redeploy.</h2></div>`;
  throw new Error("Firebase not configured");
}
const app = initializeApp(window.FIREBASE_CONFIG);
const db  = getDatabase(app);
const { WINDOW_MS } = window.CFG;

let clockOffset = 0;
onValue(ref(db,".info/serverTimeOffset"), s => clockOffset = s.val()||0);
const serverNow = () => Date.now() + clockOffset;
const fmt = ms => { const s=Math.ceil(ms/1000); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };

/* ── token helpers (from original ticket) ── */
function hash32(s){ let x=2166136261>>>0; for(let i=0;i<s.length;i++){x^=s.charCodeAt(i);x=Math.imul(x,16777619);} return x>>>0; }
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296; }; }
function mint(){ const A='23456789ABCDEFGHJKLMNPQRSTUVWXYZ'; let s=''; for(let i=0;i<6;i++) s+=A[(Math.random()*A.length)|0]; return s; }

const params = new URLSearchParams(location.search);
const roomId = params.get('room');
roomId ? initPlayer(roomId) : initHost();

/* ════════════════════════════════════════════════════════
   HOST
════════════════════════════════════════════════════════ */
async function initHost(){
  const roomRef = push(ref(db,'rooms'));
  const id = roomRef.key;
  await set(roomRef,{status:'lobby',startAt:null,drawAt:null,winnerId:null,createdAt:serverTimestamp()});
  const joinUrl = location.origin + location.pathname + '?room=' + id;

  document.body.innerHTML = `
  <div class="lobby">
    <div class="host-grid">
      <div class="panel">
        <div class="eyebrow">Mega Luck · Host</div>
        <h1>Scan to play</h1>
        <div id="qr"></div>
        <div class="lnk">${joinUrl}</div>
        <div><span class="count" id="pcount">0</span><div class="count-label">in the room</div></div>
        <div id="host-action"></div>
        <button class="btn ghost" onclick="window.open('${joinUrl}','_blank')" style="font-size:10px;padding:9px 16px">
          + Open tab to join (test)
        </button>
      </div>
      <div class="panel">
        <div class="eyebrow" id="phase-label">Waiting for players</div>
        <div id="host-stage"></div>
      </div>
    </div>
  </div>`;

  new QRCode(document.getElementById('qr'),{text:joinUrl,width:200,height:200,colorDark:'#1a1016',colorLight:'#fff'});
  const pcount   = document.getElementById('pcount');
  const phaseEl  = document.getElementById('phase-label');
  const stageEl  = document.getElementById('host-stage');
  const actionEl = document.getElementById('host-action');

  let room=null, ordered=[], drawTried=false, loop=null;

  const startBtn = document.createElement('button');
  startBtn.className='btn'; startBtn.textContent='Start 30s draw';
  startBtn.onclick = ()=>{ const n=serverNow(); update(roomRef,{status:'counting',startAt:n,drawAt:n+WINDOW_MS}); };
  actionEl.append(startBtn);

  onValue(child(roomRef,'players'), snap=>{
    const pl = snap.val()||{};
    ordered = Object.entries(pl).sort((a,b)=>(a[1].joinedAt||0)-(b[1].joinedAt||0)).map(([k])=>k);
    pcount.textContent = ordered.length;
    // start button always enabled — host decides when to begin
  });

  onValue(roomRef, snap=>{ room=snap.val(); renderHost(); });

  function renderHost(){
    if(!room) return;
    if(room.status==='lobby'){
      phaseEl.textContent='Waiting for players';
      stageEl.innerHTML=`<p class="sub">When your group is ready, hit start.</p>`;
      startBtn.classList.remove('hidden');
    }
    if(room.status==='counting'){
      startBtn.classList.add('hidden');
      phaseEl.textContent='Draw closes in';
      if(!stageEl.querySelector('.timer-big'))
        stageEl.innerHTML=`<div class="timer-big" id="ht">0:30</div>
          <p class="sub" style="margin-top:8px">Latecomers can't join once this hits zero.</p>`;
      if(!loop) loop=setInterval(tickHost,200);
    }
    if(room.status==='drawn'){
      if(loop){clearInterval(loop);loop=null;}
      phaseEl.textContent='Cards unlocked';
      stageEl.innerHTML=`<div class="winner-msg" style="font-size:clamp(18px,4vw,28px);color:var(--well)">Everyone scratch now</div>
        <p class="sub" style="margin-top:8px">${ordered.length} player${ordered.length===1?'':'s'} · winner hidden until you reveal</p>`;
      actionEl.innerHTML='';
      const revBtn=document.createElement('button');
      revBtn.className='btn';revBtn.textContent='Reveal winner';
      revBtn.onclick=()=>{
        const idx=ordered.indexOf(room.winnerId);
        const wSnap=room.players&&room.players[room.winnerId];
        const wName=wSnap&&wSnap.name?wSnap.name:`Player #${idx+1}`;
        const who=room.winnerId==='NONE'||idx<0?'No one joined in time':`${wName} wins 🎉`;
        stageEl.innerHTML=`<div class="winner-msg">${who}</div>`;
        actionEl.innerHTML='';
        const nb=document.createElement('button');
        nb.className='btn ghost';nb.textContent='New round';nb.onclick=()=>location.reload();
        actionEl.append(nb);
      };
      actionEl.append(revBtn);
    }
  }

  function tickHost(){
    if(!room||!room.drawAt) return;
    const left = Math.max(0, room.drawAt - serverNow());
    const t = document.getElementById('ht'); if(t) t.textContent=fmt(left);
    if(left<=0 && !drawTried && room.status==='counting'){ drawTried=true; doDrawWinner(); }
  }

  function doDrawWinner(){
    runTransaction(roomRef, r=>{
      if(!r||r.status!=='counting'||r.winnerId) return r;
      const pl = r.players ? Object.keys(r.players) : [];
      if(pl.length){
        pl.sort((a,b)=>(r.players[a].joinedAt||0)-(r.players[b].joinedAt||0));
        // PLACEHOLDER: 3rd to join wins. Swap for real random:
        // r.winnerId = pl[Math.floor(Math.random()*pl.length)];
        r.winnerId = pl[Math.min(2, pl.length-1)];
      } else { r.winnerId='NONE'; }
      r.status='drawn';
      return r;
    });
  }
}

/* ════════════════════════════════════════════════════════
   PLAYER — full original ticket, unlock on draw
════════════════════════════════════════════════════════ */
async function initPlayer(id){
  const roomRef = ref(db,'rooms/'+id);
  const snap = await get(roomRef);
  if(!snap.exists()){ showClosed("Room not found","Ask the host for a fresh QR."); return; }
  const first = snap.val();
  const now = serverNow();
  const open = first.status==='lobby' || (first.status==='counting' && (!first.drawAt||now<first.drawAt));

  let pid = (() => { try { return localStorage.getItem('mlhl_pid_'+id); } catch(e){ return null; } })();
  let playerName = (() => { try { return localStorage.getItem('mlhl_name_'+id); } catch(e){ return null; } })();

  // If not yet joined, show name input first
  if(!pid){
    if(!open){ showClosed("Round's closed","You just missed the window — wait for the next draw."); return; }

    // Show name entry screen — countdown prominent, name below
    playerName = await new Promise(resolve => {
      document.body.innerHTML = `
        <div class="name-screen">
          <div class="eyebrow">Mega Luck · Group Draw</div>
          <div class="name-cd" id="nameCd">—</div>
          <div class="name-cd-label" id="nameCdLabel">Waiting for host</div>
          <div class="name-divider"></div>
          <div class="name-prompt">Enter your name to access your ticket</div>
          <div class="name-sub">You need a name to scratch — enter it now while you wait</div>
          <input class="name-input" id="nameInput" type="text" maxlength="30"
            placeholder="Your name" autocomplete="off" autocorrect="off" spellcheck="false">
          <div class="name-btn-wrap">
            <button class="btn" id="nameBtn" style="width:100%;opacity:.4;cursor:not-allowed" disabled>Enter your name first</button>
          </div>
        </div>`;

      const inp  = document.getElementById('nameInput');
      const btn  = document.getElementById('nameBtn');
      const cdEl = document.getElementById('nameCd');
      const lblEl = document.getElementById('nameCdLabel');
      inp.focus();

      // Enable/disable button based on name input
      function syncBtn(){
        const hasName = inp.value.trim().length > 0;
        btn.disabled = !hasName;
        btn.style.opacity = hasName ? '1' : '.4';
        btn.style.cursor  = hasName ? 'pointer' : 'not-allowed';
        btn.textContent   = hasName ? 'Get my ticket' : 'Enter your name first';
      }
      inp.addEventListener('input', syncBtn);

      // Live countdown synced to Firebase
      let cdLoop = null;
      const unsub = onValue(roomRef, snap => {
        const r = snap.val(); if(!r) return;
        if(r.status === 'lobby'){
          cdEl.textContent = '—';
          lblEl.textContent = 'Waiting for host to start';
          if(cdLoop){ clearInterval(cdLoop); cdLoop=null; }
        } else if(r.status === 'counting' && r.drawAt){
          if(!cdLoop){
            cdLoop = setInterval(()=>{
              const left = Math.max(0, r.drawAt - serverNow());
              cdEl.textContent = fmt(left);
              lblEl.textContent = left > 0 ? 'Draw closes in' : 'Draw closed';
              if(left <= 0){
                clearInterval(cdLoop); cdLoop=null;
                cdEl.style.color = 'var(--well)';
                // if they still haven't typed a name, tell them they can still submit
                if(!inp.value.trim()){
                  inp.placeholder = 'Last chance — enter your name';
                  inp.style.borderColor = 'var(--acid)';
                  inp.focus();
                }
              }
            }, 200);
          }
        }
      });

      function submit(){
        const v = inp.value.trim();
        if(!v) return;
        btn.disabled = true; btn.textContent = 'Joining…';
        if(cdLoop){ clearInterval(cdLoop); cdLoop=null; }
        resolve(v);
      }
      btn.addEventListener('click', submit);
      inp.addEventListener('keydown', e => { if(e.key==='Enter' && !btn.disabled) submit(); });
    });

    const pRef = push(child(roomRef,'players'));
    pid = pRef.key;
    await set(pRef,{joinedAt:serverTimestamp(),token:mint(),name:playerName});
    try { localStorage.setItem('mlhl_pid_'+id,pid); } catch(e){}
    try { localStorage.setItem('mlhl_name_'+id,playerName); } catch(e){}
  }
  const ME = pid;

  /* ── build the ticket DOM ── */
  document.body.innerHTML = `
  <div class="ticket-view" id="ticketView">
    <div class="stage" id="stage">
      <div class="fit" id="fit">
        <div class="ticket-card" id="card">
          <img class="art" id="art" alt="Mega Luck Happiness Lottery ticket">
          <div class="nameplate" id="nameplate"></div>
          <div class="tgrid" id="grid"></div>
          <div class="sweep"></div>
          <canvas class="flakes" id="flakes"></canvas>
          <svg class="coin" id="coin" viewBox="0 0 100 100" aria-hidden="true">
            <defs>
              <radialGradient id="cg" cx="34%" cy="28%" r="78%">
                <stop offset="0" stop-color="#ffe6cd"/>
                <stop offset=".38" stop-color="#e5a783"/>
                <stop offset=".78" stop-color="#b9713f"/>
                <stop offset="1" stop-color="#8a4a29"/>
              </radialGradient>
            </defs>
            <path d="M50 2a48 48 0 1 0 .1 0zM38 38h24v24H38z" fill-rule="evenodd" fill="url(#cg)"/>
            <circle cx="50" cy="50" r="47.2" fill="none" stroke="#7d4325" stroke-width="1.8" opacity=".9"/>
            <circle cx="50" cy="50" r="42"   fill="none" stroke="#7d4325" stroke-width="1.3" opacity=".4"/>
            <rect x="34.6" y="34.6" width="30.8" height="30.8" fill="none" stroke="#7d4325" stroke-width="1.2" opacity=".38"/>
            <rect x="38" y="38" width="24" height="24" fill="none" stroke="#7d4325" stroke-width="1.7" opacity=".9"/>

  /* ── Firebase listener ── */
  let ticketLocked=true,timerLoop=null,iWon=false;
  const waitEl  = document.getElementById('waitingOverlay');
  const lockEl  = document.getElementById('lockOverlay');
  const lockTEl = document.getElementById('lockTimer');

  onValue(roomRef, snap=>{
    const room=snap.val(); if(!room) return;
    if(room.status==='lobby'){
      waitEl.classList.remove('hidden'); lockEl.classList.add('hidden'); ticketLocked=true;
    }
    if(room.status==='counting'){
      waitEl.classList.add('hidden'); lockEl.classList.remove('hidden');
      if(!timerLoop) timerLoop=setInterval(()=>{
        if(!room.drawAt) return;
        lockTEl.textContent=fmt(Math.max(0,room.drawAt-serverNow()));
      },200);
    }
    if(room.status==='drawn'){
      if(timerLoop){clearInterval(timerLoop);timerLoop=null;}
      waitEl.classList.add('hidden'); lockEl.classList.add('hidden');
      iWon = room.winnerId===ME;
      dealTicket(iWon);
      scratchEnabled=true;
    }
  });
}

function showClosed(title,sub){
  document.body.innerHTML=`<div style="min-height:100dvh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center;
    background:#1a1016;color:#f4e9ef;font-family:'Helvetica Neue',sans-serif;">
    <div style="font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#e5a783">Round closed</div>
    <div style="font-size:32px;font-weight:800;color:#c0c456">${title}</div>
    <p style="color:#d7a1c1;max-width:30ch;line-height:1.5">${sub}</p></div>`;
}
</script>
